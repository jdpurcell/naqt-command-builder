<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>naqt Command Builder</title>
  <style>
    :root {
      color-scheme: light dark;
      --yaml-k: #7ee787;
      --yaml-c: #f0f6fc;
      --yaml-v: #a5d6ff;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --yaml-k: #1f7a36;
        --yaml-c: #475467;
        --yaml-v: #005f99;
      }
    }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0; padding: 20px;
      display: grid; place-items: start center;
    }
    .card {
      width: min(920px, 100%);
      border: 1px solid rgba(127,127,127,.35);
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,.08);
    }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    h1 { font-size: 18px; margin: 0; }
    .repo-link {
      font-size: 13px;
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(127,127,127,.45);
      background: rgba(127,127,127,.08);
      transition: background-color .15s ease, transform .1s ease;
    }
    .repo-link:hover { background: rgba(127,127,127,.16); }
    .repo-link:active { transform: translateY(1px); }
    .grid {
      display: grid;
      grid-template-columns: minmax(160px, 23fr) minmax(160px, 17fr) minmax(160px, 17fr) minmax(160px, 43fr);
      gap: 12px;
    }
    label { display: block; font-size: 12px; opacity: .85; margin-bottom: 6px; }
    .grid > div:has(select:disabled) > label {
      opacity: .3;
    }
    select {
      width: 100%;
      padding: 6px 6px;
      border-radius: 8px;
      border: 1px solid rgba(127,127,127,.45);
      background: transparent;
      font-size: 14px;
    }
    select:disabled { opacity: .55; }
    .out {
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      border: 1px dashed rgba(127,127,127,.45);
      background: rgba(127,127,127,.06);
      display: grid;
      gap: 10px;
    }
    .cmd {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 14px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(127,127,127,.35);
      background: rgba(0,0,0,.06);
      overflow-x: auto;
      white-space: pre;
    }
    .yaml-k { color: var(--yaml-k); }
    .yaml-c { color: var(--yaml-c); }
    .yaml-v { color: var(--yaml-v); }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    button {
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(127,127,127,.45);
      background: transparent;
      cursor: pointer;
    }
    button:active { transform: translateY(1px); }
    .hint { font-size: 14px; opacity: .85; }
    .addons-grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: start;
    }
    .addons-box {
      display: grid;
      gap: 6px;
      align-content: start;
    }
    .addons-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      opacity: .95;
      margin: 0;
    }
    .addons-toggle:has(input:disabled) > span {
      opacity: .3;
    }
    input:disabled { opacity: .55; }
    .addons-list {
      max-height: 192px;
      overflow-y: auto;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(127,127,127,.35);
      background: rgba(0,0,0,.06);
      display: grid;
      gap: 6px;
      align-content: start;
      align-self: start;
    }
    .addons-list[hidden] { display: none; }
    .addons-item {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      font-size: 14px;
      opacity: .95;
    }
    .addons-list .addons-item { margin-bottom: 0; }
    .addons-status {
      font-size: 13px;
      opacity: .85;
      padding: 2px 0;
    }
    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr 1fr; }
      .addons-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 460px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title-row">
      <h1>naqt Command Builder</h1>
      <a class="repo-link" href="https://github.com/jdpurcell/naqt-command-builder/" target="_blank" rel="noopener noreferrer">GitHub Repo ↗</a>
    </div>

    <div class="grid">
      <div>
        <label for="host">Host</label>
        <select id="host"></select>
      </div>
      <div>
        <label for="target">Target</label>
        <select id="target" disabled></select>
      </div>
      <div>
        <label for="version">Version</label>
        <select id="version" disabled></select>
      </div>
      <div>
        <label for="arch">Arch</label>
        <select id="arch" disabled></select>
      </div>
    </div>

    <div class="addons-grid">
      <div class="addons-box">
        <label class="addons-toggle" for="installModules">
          <input type="checkbox" id="installModules" disabled />
          <span>Install modules</span>
        </label>
        <div id="modulesStatus" class="addons-status" hidden></div>
        <div id="modulesList" class="addons-list" hidden></div>
      </div>
      <div class="addons-box">
        <label class="addons-toggle" for="installExtensions">
          <input type="checkbox" id="installExtensions" disabled />
          <span>Install extensions</span>
        </label>
        <div id="extensionsStatus" class="addons-status" hidden></div>
        <div id="extensionsList" class="addons-list" hidden></div>
      </div>
    </div>

    <div class="out">
      <div class="row">
        <div class="hint">Command for <a href="https://github.com/jdpurcell/naqt">naqt</a>:</div>
        <button id="copy" disabled>Copy</button>
      </div>
      <div id="cmd" class="cmd"></div>
    </div>

    <div class="out">
      <div class="row">
        <div class="hint">Script for <a href="https://github.com/jdpurcell/install-qt-action">install-qt-action</a>:</div>
        <button id="copyAction" disabled>Copy</button>
      </div>
      <div id="actionYaml" class="cmd"></div>
    </div>

    <div class="out">
      <div class="row">
        <div class="hint">Link to official mirror:</div>
        <div style="display: flex; gap: 10px;">
          <button id="copyMirror" disabled>Copy</button>
          <button id="openMirror" disabled>Open</button>
        </div>
      </div>
      <div id="mirrorUrl" class="cmd"></div>
    </div>
  </div>

  const V = (maj, min, pat) => ({ major: maj, minor: min, patch: pat });
  const parseV = (s) => {
    const parts = String(s).split(".").map(x => Number(x));
    return V(parts[0] || 0, parts[1] || 0, parts[2] || 0);
  };
  const cmpV = (a, b) => (a.major - b.major) || (a.minor - b.minor) || (a.patch - b.patch);
  const lt = (a, b) => cmpV(a, b) < 0;
  const gte = (a, b) => cmpV(a, b) >= 0;
  const btw = (v, min, max) => gte(v, min) && lt(v, max);
  const vToString = (v) => `${v.major}.${v.minor}.${v.patch}`;

  // Versions = all patches for each release (0..LastPatch)
  const Versions = (() => {
    const out = [];
    for (const rel of Releases) {
      for (let p = 0; p <= rel.LastPatch; p++) {
        out.push(V(rel.Major, rel.Minor, p));
      }
    }
    return out;
  })();

  function getRelevantTargets(host) {
    const out = [];
    for (const target of Targets) {
      if (target === "ios" && host !== "mac") continue;
      out.push(target);
    }
    return out;
  }

  function getRelevantVersions(host, target) {
    const isCrossCompile = target !== "desktop";
    const arches = ArchesByPlatform[makePlatform(host, target)] || [];
    const desktopArches = isCrossCompile ? (ArchesByPlatform[makePlatform(host, "desktop")] || []) : [];
    const out = [];
    for (const version of Versions) {
      if (!arches.some(a => a.IsAvailable(version))) continue;
      if (isCrossCompile && !desktopArches.some(a => a.IsAvailable(version))) continue;
      if (target === "wasm" && cmpV(version, V(5,13,0)) === 0 && host !== "linux") continue;
      out.push(version);
    }
    return out;
  }

  function getRelevantArches(host, target, version) {
    const arches = ArchesByPlatform[makePlatform(host, target)] || [];
    return arches.filter(a => a.IsAvailable(version)).map(a => a.Name);
  }

  function getRelevantModules(host, target, version, arch) {
    const modules = ModulesByPlatformAndArch[`${makePlatform(host, target)}.${arch}`] || [];
    return modules.filter(m => m.IsAvailable(version)).map(m => m.Name);
  }

  function getRelevantExtensions(host, target, version, arch) {
    const extensions = ExtensionsByPlatformAndArch[`${makePlatform(host, target)}.${arch}`] || [];
    return extensions.filter(e => e.IsAvailable(version)).map(e => e.Name);
  }

  function makePlatform(host, target) {
    return target === "desktop" ? `${host}.${target}` : target;
  }

  function usesAllOsHost(target, version) {
    if (target === "wasm" && gte(version, V(6,7,0))) return true;
    if (target === "android" && gte(version, V(6,7,0))) return true;
    return false;
  }

  function getInstallCommand(host, target, version, arch, modules = [], extensions = []) {
    const targetHost = usesAllOsHost(target, version) ? "all_os" : host;
    const isCrossCompile =
      target !== "desktop" ||
      arch === "win64_msvc2019_arm64" ||
      arch.endsWith("_cross_compiled");
    const extraArgs = [];
    if (modules.length > 0) extraArgs.push("--modules", ...modules);
    if (extensions.length > 0) extraArgs.push("--extensions", ...extensions);
    if (isCrossCompile) extraArgs.push("--autodesktop");
    let command = `install-qt ${targetHost} ${target} ${vToString(version)} ${arch}`;
    if (extraArgs.length) command += " " + extraArgs.join(" ");
    return command;
  }

  function getInstallQtActionYaml(host, target, version, arch, modules = [], extensions = []) {
    const targetHost = usesAllOsHost(target, version) ? "all_os" : host;
    const lines = [
      "- name: Install Qt",
      "  uses: jdpurcell/install-qt-action@v5",
      "  with:",
      `    version: '${vToString(version)}'`,
      `    host: '${targetHost}'`,
      `    target: '${target}'`,
      `    arch: '${arch}'`,
    ];
    if (modules.length > 0) {
      lines.push(`    modules: '${modules.join(" ")}'`);
    }
    if (extensions.length > 0) {
      lines.push(`    extensions: '${extensions.join(" ")}'`);
    }
    lines.push(
      "    cache: true",
      "    use-naqt: true",
      "    setup-python: false",
    );
    return lines.join("\n");
  }

  function getUpdateDirectoryUrl(host, target, version, arch) {
    const actualHost = usesAllOsHost(target, version) ? "all_os" :
      host === "windows" ? `${host}_x86` :
      host === "linux" || host === "mac" ? `${host}_x64` :
      host;
    const actualTarget = target === "wasm" && lt(version, V(6,7,0)) ? "desktop" : target;
    const variant =
      host === "windows" && target === "desktop" && gte(version, V(6,11,0)) && arch.startsWith("win64_") ? arch.substring("win64_".length) :
      target === "android" && gte(version, V(6,0,0)) && arch.startsWith("android_") ? arch.substring("android_".length) :
      target === "wasm" ? (gte(version, V(6,5,0)) ? arch : "wasm") :
      "";
    const dirForVersion = `qt${version.major}_${version.major}${version.minor}${version.patch}`;
    const dirForVersionAndVariant = variant.length !== 0 ? `${dirForVersion}_${variant}` : dirForVersion;
    const actualDir = gte(version, V(6,8,0)) ? `${dirForVersion}/${dirForVersionAndVariant}` : dirForVersionAndVariant;

  function escapeHtml(s) {
    return String(s)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function renderYamlHighlighted(yaml) {
    return yaml
      .split("\n")
      .map((line) => {
        const m = line.match(/^(\s*[^:]+)(:)(.*)$/);
        if (!m) return escapeHtml(line);
        const [, key, colon, value] = m;
        return `<span class="yaml-k">${escapeHtml(key)}</span><span class="yaml-c">${colon}</span><span class="yaml-v">${escapeHtml(value)}</span>`;
      })
      .join("\n");
  }

      installCheckbox: els.installModules,
      listEl: els.modulesList,
      statusEl: els.modulesStatus,
      forceDisable,
    });
  }

  function resetExtensionsUi(forceDisable = false) {
    resetAddonUi({
      installCheckbox: els.installExtensions,
      listEl: els.extensionsList,
      statusEl: els.extensionsStatus,
      forceDisable,
    });
  }

  function resetAddonUi({ installCheckbox, listEl, statusEl, forceDisable = false }) {
    if (forceDisable) {
      installCheckbox.checked = false;
      installCheckbox.disabled = true;
    }
    listEl.hidden = true;
    listEl.innerHTML = "";
    statusEl.hidden = true;
    statusEl.textContent = "";
  }

  function setModulesStatus(text) {
    setAddonStatus(els.modulesStatus, text);
  }

  function setExtensionsStatus(text) {
    setAddonStatus(els.extensionsStatus, text);
  }

  function setAddonStatus(statusEl, text) {
    statusEl.textContent = text;
    statusEl.hidden = !text;
  }

  function renderModulesList(modules) {
    renderAddonList(els.modulesList, "addons-item", modules);
  }

  function renderExtensionsList(extensions) {
    renderAddonList(els.extensionsList, "addons-item", extensions);
  }

  function renderAddonList(listEl, itemClass, values) {
    listEl.innerHTML = "";
    for (const value of values) {
      const label = document.createElement("label");
      label.className = itemClass;
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.value = value;
      label.append(cb, document.createTextNode(value));
      listEl.appendChild(label);
    }
    listEl.hidden = values.length === 0;
    listEl.scrollTop = 0;
  }

  function loadModulesForSelection() {
    if (!hasFullSelection() || !els.installModules.checked) {
      resetModulesUi(false);
      return;
    }

    const host = els.host.value;
    const target = els.target.value;
    const version = parseV(els.version.value);
    const arch = els.arch.value;
    const modules = getRelevantModules(host, target, version, arch);
    renderModulesList(modules);
    setModulesStatus(modules.length === 0 ? "No modules found for this selection." : "");
  }

  function loadExtensionsForSelection() {
    if (!hasFullSelection() || !els.installExtensions.checked) {
      resetExtensionsUi(false);
      return;
    }

    const host = els.host.value;
    const target = els.target.value;
    const version = parseV(els.version.value);
    const arch = els.arch.value;
    const extensions = getRelevantExtensions(host, target, version, arch);
    renderExtensionsList(extensions);
    setExtensionsStatus(extensions.length === 0 ? "No extensions found for this selection." : "");
  }

  function syncAddonAvailability() {
    if (!hasFullSelection()) {
      resetModulesUi(true);
      resetExtensionsUi(true);
      return;
    }
    els.installModules.disabled = false;
    els.installExtensions.disabled = false;
    if (!els.installModules.checked) {
      resetModulesUi(false);
    }
    if (!els.installExtensions.checked) {
      resetExtensionsUi(false);
    }
  }

  function updateOutputs() {
    const host = els.host.value;
    const target = els.target.value;
    const versionStr = els.version.value;
    const arch = els.arch.value;

    if (!host || !target || !versionStr || !arch) {
      els.cmd.innerHTML = "&nbsp;";
      els.copy.disabled = true;
      els.actionYaml.innerHTML = "&nbsp;";
      els.copyAction.disabled = true;
      els.mirrorUrl.innerHTML = "&nbsp;";
      els.copyMirror.disabled = true;
      els.openMirror.disabled = true;
      return;
    }

    const version = parseV(versionStr);
    const modules = getSelectedModules();
    const extensions = getSelectedExtensions();
    const cmd = getInstallCommand(host, target, version, arch, modules, extensions);
    const actionYaml = getInstallQtActionYaml(host, target, version, arch, modules, extensions);
    const mirrorUrl = getUpdateDirectoryUrl(host, target, version, arch);
    els.cmd.textContent = cmd;
    els.copy.disabled = false;
    els.actionYaml.innerHTML = renderYamlHighlighted(actionYaml);
    els.copyAction.disabled = false;
    els.mirrorUrl.textContent = mirrorUrl;
    els.copyMirror.disabled = false;
    els.openMirror.disabled = false;
  }

  resetTarget(); resetVersion(); resetArch();

  setOptions(els.host, Hosts, "Choose…");

  els.host.addEventListener("change", () => {
    const host = els.host.value;

    resetTarget(); resetVersion(); resetArch();
    updateOutputs();

    if (!host) return;

    const targets = getRelevantTargets(host);
    setOptions(els.target, targets, "Choose…");
    els.target.disabled = false;

    syncAddonAvailability();
  });

  els.target.addEventListener("change", () => {
    const host = els.host.value;
    const target = els.target.value;

    resetVersion(); resetArch();
    updateOutputs();

    if (!host || !target) return;

    const versions = getRelevantVersions(host, target)
      .map(v => ({ value: vToString(v), label: vToString(v) }));
    versions.sort((a, b) => cmpV(parseV(b.value), parseV(a.value)));
    setOptions(els.version, versions, "Choose…");
    els.version.disabled = false;

    syncAddonAvailability();
  });

  els.version.addEventListener("change", () => {
    const host = els.host.value;
    const target = els.target.value;
    const versionStr = els.version.value;

    resetArch();
    updateOutputs();

    if (!host || !target || !versionStr) return;

    const version = parseV(versionStr);
    const arches = getRelevantArches(host, target, version);
    setOptions(els.arch, arches, "Choose…");
    els.arch.disabled = false;

    syncAddonAvailability();

    if (arches.length === 1) {
      els.arch.value = arches[0];
      els.arch.dispatchEvent(new Event("change"));
    }
  });

  els.arch.addEventListener("change", () => {
    if (els.installModules.checked) {
      els.installModules.checked = false;
    }
    if (els.installExtensions.checked) {
      els.installExtensions.checked = false;
    }
    syncAddonAvailability();
    updateOutputs();
  });

  els.installModules.addEventListener("change", () => {
    if (els.installModules.checked) {
      loadModulesForSelection();
    } else {
      resetModulesUi(false);
    }
    updateOutputs();
  });

  els.installExtensions.addEventListener("change", () => {
    if (els.installExtensions.checked) {
      loadExtensionsForSelection();
    } else {
      resetExtensionsUi(false);
    }
    updateOutputs();
  });

  els.modulesList.addEventListener("change", (event) => {
    if (!(event.target instanceof HTMLInputElement)) return;
    if (event.target.type !== "checkbox") return;
    updateOutputs();
  });

  els.extensionsList.addEventListener("change", (event) => {
    if (!(event.target instanceof HTMLInputElement)) return;
    if (event.target.type !== "checkbox") return;
    updateOutputs();
  });

  function bindCopyButton(buttonEl, sourceEl) {
    buttonEl.addEventListener("click", async () => {
      const text = sourceEl.textContent || "";
      try {
        await navigator.clipboard.writeText(text);
        const old = buttonEl.textContent;
        buttonEl.textContent = "Copied!";
        setTimeout(() => (buttonEl.textContent = old), 900);
      } catch {
        const r = document.createRange();
        r.selectNodeContents(sourceEl);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(r);
      }
    });
  }

  bindCopyButton(els.copy, els.cmd);
  bindCopyButton(els.copyAction, els.actionYaml);
  bindCopyButton(els.copyMirror, els.mirrorUrl);

  els.openMirror.addEventListener("click", () => {
    const url = (els.mirrorUrl.textContent || "").trim();
    if (!url) return;
    window.open(url, "_blank", "noopener,noreferrer");
  });

  syncAddonAvailability();
  updateOutputs();
})();
</script>
</body>
</html>
